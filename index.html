<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LB Deck Builder — Template Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #090909;
  --surface: #111111;
  --surface2: #191919;
  --surface3: #222222;
  --border: #282828;
  --border2: #333333;
  --accent: #F97316;
  --accent-bg: rgba(249,115,22,0.1);
  --accent-border: rgba(249,115,22,0.25);
  --text: #E2E2E2;
  --text-dim: #888;
  --text-faint: #3a3a3a;
  --green: #22c55e;
  --amber: #F97316;
  --gray: #666;
  --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --sans: -apple-system, 'Helvetica Neue', Arial, sans-serif;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  font-size: 13px;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 210px;
  min-width: 210px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.sidebar-logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.logo-icon {
  width: 26px; height: 26px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.logo-text {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
}
.logo-sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  margin-left: 34px;
}
.template-section-label {
  padding: 14px 14px 6px;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-weight: 700;
}
.template-list { flex: 1; overflow-y: auto; padding: 0 6px 6px; }
.tpl-item {
  padding: 8px 10px;
  border-radius: 7px;
  cursor: pointer;
  margin-bottom: 1px;
  border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.tpl-item:hover { background: var(--surface2); }
.tpl-item.active { background: var(--accent-bg); border-color: var(--accent-border); }
.tpl-item-row { display: flex; align-items: center; gap: 6px; }
.tpl-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.tpl-id { font-size: 9px; color: var(--text-faint); font-family: var(--mono); }
.tpl-meta { display: flex; align-items: center; gap: 5px; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.dot.locked { background: var(--green); }
.dot.in-progress { background: var(--amber); }
.dot.draft { background: var(--gray); }
.tpl-status { font-size: 9px; color: var(--text-dim); }

.sidebar-foot {
  padding: 10px 6px;
  border-top: 1px solid var(--border);
  display: flex; gap: 6px;
}
.btn-new {
  flex: 1;
  padding: 8px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 7px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-new:hover { opacity: 0.88; }

/* ── MAIN ── */
.main { flex: 1; display: flex; overflow: hidden; min-width: 0; }

/* ── SLIDE PANEL ── */
.slide-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  min-width: 0;
  overflow: hidden;
}
.pane-header {
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  height: 50px;
  flex-shrink: 0;
}
.pane-title { font-size: 12px; font-weight: 600; }
.pane-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.badge {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
}
.badge.locked { background: rgba(34,197,94,0.12); color: #22c55e; }
.badge.in-progress { background: rgba(249,115,22,0.12); color: #F97316; }
.badge.draft { background: rgba(100,100,100,0.15); color: #888; }
.btn-lock {
  margin-left: auto;
  padding: 5px 10px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--text-dim);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-lock:hover { border-color: var(--accent); color: var(--accent); }

.canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #060606;
  padding: 24px;
  overflow: hidden;
}
canvas#slide {
  max-width: 100%;
  max-height: 100%;
  border: 1px solid var(--border);
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}

.elements-pane {
  height: 175px;
  min-height: 175px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.elements-head {
  padding: 8px 16px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.elements-head-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 700;
}
.elements-list { overflow-y: auto; flex: 1; padding: 4px 6px; }
.el-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  border: 1px solid transparent;
}
.el-row:hover { background: var(--surface2); }
.el-row.sel { background: var(--accent-bg); border-color: var(--accent-border); }
.el-tag {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 3px;
  background: var(--surface3);
  color: var(--text-dim);
  min-width: 34px;
  text-align: center;
}
.el-label { flex: 1; color: var(--text); }
.el-coords { font-family: var(--mono); font-size: 9px; color: var(--text-faint); }

/* ── CHAT PANEL ── */
.chat-panel {
  width: 350px;
  min-width: 350px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.chat-msgs {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
  padding: 20px;
}
.chat-empty-state .icon { font-size: 22px; }
.chat-empty-state p { font-size: 11px; color: var(--text-dim); line-height: 1.6; max-width: 200px; }
.msg {
  max-width: 88%;
  padding: 9px 11px;
  border-radius: 10px;
  font-size: 11.5px;
  line-height: 1.65;
  word-break: break-word;
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 3px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--surface2);
  color: var(--text);
  border-bottom-left-radius: 3px;
  border: 1px solid var(--border);
}
.msg code {
  font-family: var(--mono);
  font-size: 10px;
  background: rgba(0,0,0,0.35);
  padding: 1px 4px;
  border-radius: 3px;
}
.msg pre {
  font-family: var(--mono);
  font-size: 10px;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  padding: 8px 10px;
  border-radius: 6px;
  margin-top: 7px;
  overflow-x: auto;
  white-space: pre-wrap;
  line-height: 1.5;
}
.typing-bubble {
  align-self: flex-start;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  border-bottom-left-radius: 3px;
  padding: 10px 14px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.typing-bubble span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: pulse 1.2s infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
@keyframes pulse {
  0%,80%,100% { opacity: 0.3; transform: scale(0.85); }
  40% { opacity: 1; transform: scale(1); }
}
.chat-foot {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--surface);
}
.chat-hint {
  font-size: 9px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
}
.chat-row { display: flex; gap: 7px; align-items: flex-end; }
textarea.chat-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 11.5px;
  padding: 8px 10px;
  resize: none;
  font-family: var(--sans);
  height: 68px;
  outline: none;
  line-height: 1.5;
  transition: border-color 0.15s;
}
textarea.chat-input:focus { border-color: var(--accent); }
textarea.chat-input::placeholder { color: var(--text-faint); }
textarea.chat-input:disabled { opacity: 0.4; }
button.send {
  width: 34px; height: 34px;
  background: var(--accent);
  border: none;
  border-radius: 7px;
  color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
button.send:hover { opacity: 0.88; }
button.send:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── MODAL ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 22px;
  width: 380px;
}
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 18px; }
.fgroup { margin-bottom: 12px; }
.flabel {
  display: block;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 5px;
}
.finput, .fselect {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 7px 10px;
  font-family: var(--sans);
  outline: none;
  transition: border-color 0.15s;
}
.finput:focus, .fselect:focus { border-color: var(--accent); }
.fselect option { background: var(--surface2); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-cancel-m {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
}
.btn-cancel-m:hover { background: var(--surface2); }
.btn-create-m {
  padding: 7px 14px;
  background: var(--accent);
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">🍊</div>
      <div class="logo-text">LB</div>
    </div>
    <div class="logo-sub">Deck Builder Studio</div>
  </div>
  <div class="template-section-label">Templates</div>
  <div class="template-list" id="tplList"></div>
  <div class="sidebar-foot">
    <button class="btn-new" onclick="openModal()">+ New Template</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SLIDE PREVIEW PANEL -->
  <div class="slide-panel">
    <div class="pane-header" id="slideHeader">
      <div>
        <div class="pane-title" id="hTitle">Select a template</div>
        <div class="pane-sub" id="hSub">—</div>
      </div>
      <span class="badge draft" id="hBadge" style="display:none"></span>
      <button class="btn-lock" id="btnLock" style="display:none" onclick="toggleLock()">Lock</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="slide"></canvas>
    </div>
    <div class="elements-pane">
      <div class="elements-head">
        <span class="elements-head-label">Elements</span>
        <span style="font-size:9px;color:var(--text-faint);margin-left:auto">click to highlight</span>
      </div>
      <div class="elements-list" id="elList"></div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel">
    <div class="pane-header">
      <div>
        <div class="pane-title">AI Assistant</div>
        <div class="pane-sub">Iterate on this template</div>
      </div>
      <button class="btn-lock" style="display:block;margin-left:auto" onclick="clearChat()">Clear</button>
    </div>
    <div class="chat-msgs" id="chatMsgs">
      <div class="chat-empty-state" id="chatEmpty">
        <div class="icon">🍊</div>
        <p>Select a template and describe changes — ask for pixel nudges, new elements, or full GAS code snippets.</p>
      </div>
    </div>
    <div class="chat-foot">
      <div class="chat-hint">Cmd+Enter to send · Ctrl+Enter to send</div>
      <div class="chat-row">
        <textarea class="chat-input" id="chatInput" placeholder="e.g. Move CLIENT left by 14px, describe the footer spec, generate addFooter() code..." disabled onkeydown="onKey(event)"></textarea>
        <button class="send" id="sendBtn" onclick="sendMsg()" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white" style="transform:rotate(90deg)"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- NEW TEMPLATE MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">New Template</div>
    <div class="fgroup">
      <label class="flabel">Template ID (e.g. 03)</label>
      <input class="finput" id="nId" placeholder="03" />
    </div>
    <div class="fgroup">
      <label class="flabel">Short Name</label>
      <input class="finput" id="nName" placeholder="SectionDivider" />
    </div>
    <div class="fgroup">
      <label class="flabel">Description</label>
      <input class="finput" id="nDesc" placeholder="Short description of this slide type" />
    </div>
    <div class="fgroup">
      <label class="flabel">Base on existing template</label>
      <select class="fselect" id="nBase"><option value="">Blank canvas</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-create-m" onclick="createTpl()">Create</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──
const SW = 720, SH = 405;

// ── INITIAL TEMPLATES ──
const INIT = [
  {
    id: '01',
    name: '01_CoverPage_NO_DeckTitle',
    short: 'Cover A',
    status: 'locked',
    desc: 'Black cover page, no deck title',
    els: [
      { t:'bg', lbl:'Background', fill:'#000000' },
      { t:'img', lbl:'LOGO', x:14, y:15, w:692, h:135, fill:'#161616', stk:'#2a2a2a' },
      { t:'img', lbl:'Rocky Image', x:272, y:223, w:176, h:130, fill:'#1e1e1e', stk:'#333' },
      { t:'txt', lbl:'"Creative"', x:10, y:363, w:150, h:35, val:'Creative', fs:22, bold:true, italic:true, col:'#ffffff', align:'left' },
      { t:'txt', lbl:'"Consultancy"', x:564, y:363, w:150, h:35, val:'Consultancy', fs:22, bold:true, italic:true, col:'#ffffff', align:'right' },
      { t:'txt', lbl:'Tagline', x:165, y:369, w:390, h:20, val:'Empowering bold brands to grow through\nfuture-led creative thinking', fs:7, col:'#aaaaaa', align:'center' },
    ]
  },
  {
    id: '02',
    name: '02_CoverPage_w_DeckTitle',
    short: 'Cover B',
    status: 'in-progress',
    desc: 'Cover page with deck title in footer',
    els: [
      { t:'bg', lbl:'Background', fill:'#000000' },
      { t:'img', lbl:'LOGO', x:14, y:15, w:692, h:135, fill:'#161616', stk:'#2a2a2a' },
      { t:'img', lbl:'Rocky Image', x:272, y:223, w:176, h:130, fill:'#1e1e1e', stk:'#333' },
      { t:'txt', lbl:'"Creative"', x:10, y:363, w:150, h:35, val:'Creative', fs:22, bold:true, italic:true, col:'#ffffff', align:'left' },
      { t:'txt', lbl:'"Consultancy"', x:564, y:363, w:150, h:35, val:'Consultancy', fs:22, bold:true, italic:true, col:'#ffffff', align:'right' },
      { t:'txt', lbl:'Tagline', x:165, y:369, w:390, h:20, val:'Empowering bold brands to grow through\nfuture-led creative thinking', fs:7, col:'#aaaaaa', align:'center' },
      { t:'rect', lbl:'Footer Bar', x:0, y:388, w:720, h:17, fill:'#0e0e0e' },
      { t:'txt', lbl:'CLIENT', x:22.2, y:389, w:60, h:14, val:'CLIENT', fs:5.5, col:'#ffffff', align:'left' },
      { t:'txt', lbl:'Separator /', x:85, y:389, w:10, h:14, val:'/', fs:5.5, col:'#444', align:'center' },
      { t:'txt', lbl:'INTRO', x:97.9, y:389, w:100, h:14, val:'INTRO', fs:5.5, col:'#888', align:'left' },
      { t:'txt', lbl:'Deck Title', x:515.5, y:389, w:180, h:14, val:'VISION AND VALUES WORKSHOP', fs:5.5, col:'#ffffff', align:'right' },
      { t:'txt', lbl:'Page #', x:693, y:389, w:27, h:14, val:'01', fs:5.5, col:'#666', align:'right' },
    ]
  }
];

// ── STATE ──
let S = {
  templates: JSON.parse(JSON.stringify(INIT)),
  active: '01',
  selEl: null,
  chats: { '01': [], '02': [] },
  loading: false
};

// ── CANVAS ──
const canvas = document.getElementById('slide');
const ctx = canvas.getContext('2d');
let CW = 600, CH = 338, SC = CW / SW;

function resizeCanvas() {
  const wrap = canvas.parentElement;
  const maxW = wrap.clientWidth - 48;
  const maxH = wrap.clientHeight - 48;
  const r = SW / SH;
  let w = maxW, h = w / r;
  if (h > maxH) { h = maxH; w = h * r; }
  CW = Math.round(w); CH = Math.round(h); SC = CW / SW;
  canvas.width = CW; canvas.height = CH;
  draw();
}

function draw() {
  const tpl = S.templates.find(t => t.id === S.active);
  if (!tpl) { ctx.fillStyle = '#111'; ctx.fillRect(0,0,CW,CH); return; }
  ctx.clearRect(0,0,CW,CH);

  for (let i = 0; i < tpl.els.length; i++) {
    const e = tpl.els[i];
    const x = (e.x||0)*SC, y = (e.y||0)*SC;
    const w = (e.w||SW)*SC, h = (e.h||SH)*SC;

    if (e.t === 'bg') {
      ctx.fillStyle = e.fill || '#000';
      ctx.fillRect(0,0,CW,CH);
    } else if (e.t === 'rect') {
      ctx.fillStyle = e.fill || '#111';
      ctx.fillRect(x,y,w,h);
    } else if (e.t === 'img') {
      ctx.fillStyle = e.fill || '#1a1a1a';
      ctx.fillRect(x,y,w,h);
      if (e.stk) { ctx.strokeStyle = e.stk; ctx.lineWidth = 0.5; ctx.strokeRect(x,y,w,h); }
      ctx.save();
      ctx.fillStyle = '#3a3a3a';
      const fsize = Math.min(Math.max(7, h*0.13), 13);
      ctx.font = `${fsize}px -apple-system, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(e.lbl || '', x+w/2, y+h/2);
      ctx.restore();
    } else if (e.t === 'txt') {
      ctx.save();
      const fsize = Math.max(5.5, (e.fs||10) * SC * 1.5);
      let fstr = '';
      if (e.italic) fstr += 'italic ';
      if (e.bold) fstr += 'bold ';
      fstr += `${fsize}px -apple-system, 'Helvetica Neue', sans-serif`;
      ctx.font = fstr;
      ctx.fillStyle = e.col || '#fff';
      ctx.textBaseline = 'middle';
      const lines = (e.val||'').split('\n');
      const lh = fsize * 1.3;
      const totalH = lh * lines.length;
      const baseY = y + h/2 - totalH/2 + lh/2;
      if (e.align === 'right') {
        ctx.textAlign = 'right';
        lines.forEach((l,li) => ctx.fillText(l, x+w, baseY + li*lh));
      } else if (e.align === 'center') {
        ctx.textAlign = 'center';
        lines.forEach((l,li) => ctx.fillText(l, x+w/2, baseY + li*lh));
      } else {
        ctx.textAlign = 'left';
        lines.forEach((l,li) => ctx.fillText(l, x, baseY + li*lh));
      }
      ctx.restore();
    }
  }

  // highlight selected element
  if (S.selEl !== null) {
    const e = tpl.els[S.selEl];
    if (e && e.t !== 'bg') {
      ctx.save();
      ctx.strokeStyle = '#F97316';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4,3]);
      ctx.strokeRect((e.x||0)*SC-1.5, (e.y||0)*SC-1.5, (e.w||SW)*SC+3, (e.h||SH)*SC+3);
      ctx.setLineDash([]);
      ctx.restore();
    }
  }
}

window.addEventListener('resize', resizeCanvas);

// ── RENDER TEMPLATE LIST ──
function renderList() {
  const el = document.getElementById('tplList');
  el.innerHTML = S.templates.map(t => `
    <div class="tpl-item ${t.id===S.active?'active':''}" onclick="selectTpl('${t.id}')">
      <div class="tpl-item-row">
        <span class="tpl-name">${t.short}</span>
        <span class="tpl-id">#${t.id}</span>
      </div>
      <div class="tpl-meta">
        <div class="dot ${t.status}"></div>
        <span class="tpl-status">${t.status.replace('-',' ')}</span>
      </div>
    </div>`).join('');
}

// ── RENDER ELEMENT LIST ──
function renderElList() {
  const tpl = S.templates.find(t => t.id === S.active);
  if (!tpl) return;
  const el = document.getElementById('elList');
  el.innerHTML = tpl.els.map((e,i) => {
    const coords = e.t === 'bg' ? '720 × 405 pt' : `${Math.round(e.x||0)},${Math.round(e.y||0)} · ${Math.round(e.w||SW)}×${Math.round(e.h||SH)}`;
    return `<div class="el-row ${S.selEl===i?'sel':''}" onclick="selEl(${i})">
      <span class="el-tag">${e.t}</span>
      <span class="el-label">${e.lbl||''}</span>
      <span class="el-coords">${coords}</span>
    </div>`;
  }).join('');
}

// ── SELECT TEMPLATE ──
function selectTpl(id) {
  S.active = id; S.selEl = null;
  const t = S.templates.find(t => t.id === id);
  document.getElementById('hTitle').textContent = t.name;
  document.getElementById('hSub').textContent = t.desc;
  const badge = document.getElementById('hBadge');
  badge.style.display = '';
  badge.className = `badge ${t.status}`;
  badge.textContent = t.status.replace('-',' ');
  const btnLock = document.getElementById('btnLock');
  btnLock.style.display = t.status !== 'locked' ? '' : 'none';
  btnLock.textContent = t.status === 'locked' ? 'Locked' : 'Lock it';
  document.getElementById('chatInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  renderList();
  renderElList();
  draw();
  renderChat();
}

function selEl(i) {
  S.selEl = S.selEl === i ? null : i;
  renderElList();
  draw();
}

function toggleLock() {
  const t = S.templates.find(t => t.id === S.active);
  if (!t || t.status === 'locked') return;
  if (!confirm(`Lock "${t.name}"? This marks it as final.`)) return;
  t.status = 'locked';
  selectTpl(S.active);
}

// ── CHAT ──
const SYS = `You are an expert Google Apps Script (GAS) developer helping build the LB Deck Builder — a tool generating branded Google Slides for LB (a creative consultancy).

TECH SPECS:
- Slide canvas: 720×405pt (SW=720, SH=405)
- Scale: 3px = 1pt → pixel value ÷ 1.333 = pt
- Origin: top-left

KEY HELPERS:
  txt(slide, x, y, w, h, content, fontSize, fontFamily, bold, italic, color, align, bg)
  addFooter(slide, pageNum, sectionName, deckTitle, clientName)
  buildSlide(slideNum, pageNum)
  buildSlide02Only()   ← runs only slide 02 for testing
  buildTestDeck()      ← builds full test deck

TEMPLATE 01 (LOCKED — never modify):
  bg: black · Logo: x=14 y=15 w=692 h=135 · Rocky img: x=272 y=223 w=176 h=130
  "Creative": x=10 y=363 w=150 h=35 · 22pt italic bold white · align left
  "Consultancy": x=SW-156 y=363 w=150 h=35 · 22pt italic bold white · align right
  Tagline: x=165 y=369 w=SW-330 h=20 · 7pt light · center

TEMPLATE 02 (IN PROGRESS):
  Same as 01 + footer bar at y=388, h=17 (#0e0e0e)
  Footer elements (all ~5.5pt):
    CLIENT:     x≈22.2   w=60   white   left
    /:          x≈85     w=10   #444    center
    INTRO:      x≈97.9   w=100  #888    left
    Deck Title: x=SW-204.5 w=180 white  right  (e.g. "VISION AND VALUES WORKSHOP")
    Page #:     x=SW-27  w=27   #666    right

When iterating: give precise pt values, show before/after, provide copy-paste GAS code.
Keep responses concise and actionable. Format code in triple-backtick blocks.`;

function renderChat() {
  const id = S.active;
  const msgs = S.chats[id] || [];
  const el = document.getElementById('chatMsgs');
  if (!msgs.length) {
    el.innerHTML = `<div class="chat-empty-state" id="chatEmpty">
      <div class="icon">🍊</div>
      <p>Chat about positioning, pixel nudges, or ask for GAS code snippets for <strong>${S.templates.find(t=>t.id===id)?.short||'this template'}</strong>.</p>
    </div>`;
    return;
  }
  el.innerHTML = msgs.map(m => {
    let html = m.content
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n([\s\S]*?)```/g, (_,c) => `<pre>${c}</pre>`)
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/\n/g,'<br>');
    return `<div class="msg ${m.role}">${html}</div>`;
  }).join('');
  if (S.loading) {
    el.innerHTML += `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
  }
  el.scrollTop = el.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('chatInput');
  const txt = inp.value.trim();
  if (!txt || S.loading) return;
  const id = S.active;
  if (!S.chats[id]) S.chats[id] = [];
  S.chats[id].push({ role:'user', content: txt });
  inp.value = '';
  S.loading = true;
  document.getElementById('sendBtn').disabled = true;
  renderChat();

  const tpl = S.templates.find(t => t.id === id);
  const ctx2 = `\n\nACTIVE TEMPLATE: ${tpl.name} (${tpl.status})\nElements: ${tpl.els.map(e=>e.lbl||e.t).join(', ')}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYS + ctx2,
        messages: S.chats[id]
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'No response received.';
    S.chats[id].push({ role:'assistant', content: reply });
  } catch(err) {
    S.chats[id].push({ role:'assistant', content:`Error: ${err.message}` });
  }
  S.loading = false;
  document.getElementById('sendBtn').disabled = false;
  renderChat();
}

function clearChat() {
  if (!confirm('Clear this template\'s chat history?')) return;
  S.chats[S.active] = [];
  renderChat();
}

function onKey(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendMsg(); }
}

// ── NEW TEMPLATE MODAL ──
function openModal() {
  const sel = document.getElementById('nBase');
  sel.innerHTML = '<option value="">Blank canvas</option>' +
    S.templates.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  document.getElementById('modal').classList.add('open');
  document.getElementById('nId').focus();
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function createTpl() {
  const id = document.getElementById('nId').value.trim();
  const name = document.getElementById('nName').value.trim();
  const desc = document.getElementById('nDesc').value.trim();
  const baseId = document.getElementById('nBase').value;
  if (!id || !name) { alert('ID and name are required.'); return; }
  if (S.templates.find(t => t.id === id)) { alert(`ID "${id}" already exists.`); return; }
  let els = [{ t:'bg', lbl:'Background', fill:'#000000' }];
  if (baseId) { const base = S.templates.find(t => t.id === baseId); if (base) els = JSON.parse(JSON.stringify(base.els)); }
  S.templates.push({ id, name:`${id.padStart(2,'0')}_${name}`, short:name, status:'draft', desc: desc||'New template', els });
  S.chats[id] = [];
  closeModal();
  document.getElementById('nId').value=''; document.getElementById('nName').value=''; document.getElementById('nDesc').value='';
  renderList();
  selectTpl(id);
}
document.getElementById('modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });

// ── INIT ──
renderList();
selectTpl('01');
resizeCanvas();
</script>
